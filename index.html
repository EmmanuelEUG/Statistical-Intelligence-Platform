<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SIP — Business Intelligence Platform</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet" />
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
  <script src="https://cdn.plot.ly/plotly-2.27.0.min.js"></script>
  <style>
    :root {
      --bg: #000003; --cyan: #00cfff; --magenta: #ff00cc; --gold: #ffd600; --mint: #00ffb2; --red: #ff3c00;
      --border: rgba(0, 207, 255, 0.2); --text: #ffffff; --sub: rgba(255, 255, 255, 0.5);
      --mono: 'Space Mono', monospace; --display: 'Syne', sans-serif;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { width: 100vw; height: 100vh; background: var(--bg); font-family: var(--mono); color: var(--text); cursor: none; overflow: hidden; }
    canvas#bg { position: fixed; inset: 0; z-index: 1; pointer-events: auto; }
    #noise, #scanlines { position: fixed; inset: 0; z-index: 2; pointer-events: none; }
    #noise { background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.05'/%3E%3C/svg%3E"); mix-blend-mode: overlay; }
    #scanlines { background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,207,255,0.01) 2px, rgba(0,207,255,0.01) 4px); }
    #cursor-dot { position: fixed; width: 6px; height: 6px; background: #fff; border-radius: 50%; pointer-events: none; z-index: 99999; transform: translate(-50%,-50%); mix-blend-mode: difference; }
    #cursor-ring { position: fixed; width: 34px; height: 34px; border: 1.5px solid var(--cyan); border-radius: 4px; pointer-events: none; z-index: 99998; transform: translate(-50%,-50%); transition: all 0.1s ease-out; }
    #app { position: relative; z-index: 5; width: 100vw; height: 100vh; pointer-events: none; }
    #section-overlay { position: fixed; inset: 0; z-index: 1000; display: none; background: rgba(0,0,3,0.97); flex-direction: column; pointer-events: auto; backdrop-filter: blur(20px); }
    #section-overlay.active { display: flex; }
    #sec-header { display: flex; align-items: center; justify-content: space-between; padding: 30px 60px; border-bottom: 1px solid var(--border); }
    #sec-header h1 { font-family: 'Syne', sans-serif; font-weight: 800; font-size: 24px; color: var(--cyan); }
    #sec-main { flex: 1; overflow-y: auto; padding: 50px 80px; }
    .back-btn { color: var(--cyan); cursor: pointer; padding: 12px 30px; border: 1px solid var(--cyan); border-radius: 4px; font-size: 12px; font-weight: 800; background: rgba(0,207,255,0.05); transition: 0.3s; text-transform: uppercase; letter-spacing: 0.1em; }
    .back-btn:hover { background: var(--cyan); color: #000; box-shadow: 0 0 25px var(--cyan); }
    .ai-btn { color: var(--gold); border: 1px solid var(--gold); background: rgba(255,214,0,0.05); margin-left: 15px; }
    .ai-btn:hover { background: var(--gold); color: #000; box-shadow: 0 0 25px var(--gold); }
    .card { background: rgba(255,255,255,0.03); border: 1px solid var(--border); border-radius: 8px; padding: 30px; margin-bottom: 30px; }
    .card-title { font-size: 13px; color: var(--cyan); text-transform: uppercase; letter-spacing: 0.2em; margin-bottom: 20px; border-bottom: 1px solid rgba(0,207,255,0.1); padding-bottom: 12px; font-weight: 700; }
    .sip-select, .sip-input { width: 100%; background: #000; border: 1px solid var(--border); border-radius: 4px; padding: 14px; color: #fff; font-family: var(--mono); outline: none; transition: 0.3s; font-size: 14px; }
    .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 40px; }
    .result-val { font-size: 28px; font-weight: 800; color: var(--mint); font-family: var(--display); }
    .sip-table { width: 100%; border-collapse: collapse; }
    .sip-table th { text-align: left; font-size: 11px; color: var(--sub); padding: 15px; border-bottom: 1px solid var(--border); }
    .sip-table td { padding: 15px; font-size: 13px; border-bottom: 1px solid rgba(0,207,255,0.05); }
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-thumb { background: var(--cyan); border-radius: 10px; }
  </style>
</head>
<body>
  <canvas id="bg"></canvas>
  <div id="noise"></div><div id="scanlines"></div><div id="cursor-dot"></div><div id="cursor-ring"></div>
  <div id="hud-top"><div class="logo" style="pointer-events:none; padding:40px 60px; font-size:28px;">SIP<span>.</span></div></div>
  <div id="app"></div>

  <script type="text/babel">
    const { useState, useEffect, useRef, useMemo, useCallback } = React;

    const SECTIONS_REF = [
      { id: "upload", title: "RECOLECCIÓN DE DATOS" },
      { id: "dataset", title: "VISIÓN ESTRATÉGICA" },
      { id: "distribution", title: "TENDENCIAS Y RIESGOS" },
      { id: "z_value", title: "ANÁLISIS DE PROBABILIDAD" },
      { id: "hypothesis", title: "DECISIONES BASADAS EN DATOS" },
    ];

    const ST = {
      normPDF(x) { return (1 / Math.sqrt(2 * Math.PI)) * Math.exp(-0.5 * x * x); },
      normCDF(x) {
        const t = 1 / (1 + 0.2316419 * Math.abs(x));
        const d = 0.3989423 * Math.exp(-x * x / 2);
        const p = d * t * (0.3193815 + t * (-0.3565638 + t * (1.7814779 + t * (-1.8212560 + t * 1.3302744))));
        return x > 0 ? 1 - p : p;
      },
      normPPF(p) {
        if (p >= 0.995) return 2.576; if (p >= 0.975) return 1.96; if (p >= 0.95) return 1.645;
        if (p <= 0.005) return -2.576; if (p <= 0.025) return -1.96; if (p <= 0.05) return -1.645;
        return 0;
      },
      getStats(col, data) {
        if (!col || !data || data.length === 0) return { mean: 0, std: 1, n: 0, min: 0, max: 0 };
        const vals = data.map(d => parseFloat(d[col])).filter(n => !isNaN(n) && isFinite(n));
        if (vals.length === 0) return { mean: 0, std: 1, n: 0, min: 0, max: 0 };
        const n = vals.length, mean = vals.reduce((a, b) => a + b, 0) / n;
        const std = Math.sqrt(vals.reduce((a, b) => a + (b - mean) ** 2, 0) / Math.max(1, n - 1)) || 1;
        const sorted = [...vals].sort((a, b) => a - b);
        return { mean, std, n, min: sorted[0], max: sorted[n-1] };
      }
    };

    function UploadSection({ onLoaded, currentData }) {
      const handleFile = (e) => { 
        const file = e.target.files[0]; 
        if(!file) return; 
        Papa.parse(file, { header:true, skipEmptyLines:true, complete:(r)=>{ onLoaded(r.data, r.meta.fields); } }); 
      };
      return (
        <div className="card" style={{textAlign:"center", padding:80}}>
          <div className="card-title">IMPORTACIÓN DE ACTIVOS</div>
          <input type="file" accept=".csv" onChange={handleFile} id="up" style={{display:"none"}} />
          <label htmlFor="up" className="back-btn">SELECCIONAR ARCHIVO LOCAL</label>
          {currentData && currentData.length > 0 && <p style={{marginTop:30, color:"var(--mint)"}}>{currentData.length} REGISTROS LISTOS.</p>}
        </div>
      );
    }

    function DistributionFlow({ data, columns }) {
      const numCols = useMemo(() => columns.filter(c => data[0] && !isNaN(parseFloat(data[0][c]))), [columns, data]);
      const [col, setCol] = useState(numCols[0] || ""); 
      const chartRef = useRef(null); 
      const stats = useMemo(() => ST.getStats(col, data), [col, data]);
      useEffect(() => { 
        if (!col || !data || !data.length || !chartRef.current) return; 
        const vals = data.map(d => parseFloat(d[col])).filter(n => !isNaN(n)); 
        const min = stats.mean - stats.std * 4, max = stats.mean + stats.std * 4; 
        const xV = [], yV = [], steps = 100; 
        for (let i = 0; i <= steps; i++) { 
          const x = min + (i * (max - min) / steps), y = (1 / (stats.std * Math.sqrt(2 * Math.PI))) * Math.exp(-0.5 * Math.pow((x - stats.mean) / stats.std, 2)); 
          xV.push(x); yV.push(y); 
        } 
        Plotly.newPlot(chartRef.current, [
          { x: vals, name: "Data", type: "histogram", histnorm: "probability density", marker: { color: "rgba(0, 207, 255, 0.2)" } }, 
          { x: xV, y: yV, type: "scatter", mode: "lines", name: "Gaussian", line: { color: "#ff00cc", width: 3 } }
        ], { 
          paper_bgcolor: "rgba(0,0,0,0)", plot_bgcolor: "rgba(0,0,0,0)", margin: { t: 10, r: 10, b: 30, l: 30 }, 
          font: { family: "Space Mono", color: "#fff", size: 10 }, xaxis: { gridcolor: "rgba(255,255,255,0.05)" }, 
          yaxis: { visible: false }, showlegend: false 
        }, { responsive: true, displayModeBar: false }); 
      }, [col, data, stats]);
      return (
        <div className="card">
          <div className="card-title">DISTRIBUCIÓN</div>
          <select className="sip-select" value={col} onChange={e=>setCol(e.target.value)}>{numCols.map(c=><option key={c} value={c}>{c}</option>)}</select>
          <div ref={chartRef} style={{height: "350px"}}></div>
        </div>
      );
    }

    function ScoreProcessor({ data, columns }) {
      const numCols = useMemo(() => columns.filter(c => data[0] && !isNaN(parseFloat(data[0][c]))), [columns, data]);
      const [col, setCol] = useState(numCols[0] || ""); 
      const [valX, setValX] = useState(0); 
      const [tail, setTail] = useState("left"); 
      const chartRef = useRef(null); 
      const stats = useMemo(() => ST.getStats(col, data), [col, data]); 
      const z = stats.std !== 0 ? (valX - stats.mean) / stats.std : 0;
      useEffect(() => { 
        if (!chartRef.current) return; 
        const xV = [], yV = [], xS = [], yS = [], steps = 150; 
        for (let i = 0; i <= steps; i++) { 
          const cx = -4 + (i * 8 / steps), cy = ST.normPDF(cx); xV.push(cx); yV.push(cy); 
          let fill = (tail === "left" && cx <= z) || (tail === "right" && cx >= z) || (tail === "both" && Math.abs(cx) >= Math.abs(z));
          if (fill) { xS.push(cx); yS.push(cy); } 
        } 
        const traces = [
          { x: xV, y: yV, type: "scatter", mode: "lines", line: { color: "rgba(255, 255, 255, 0.2)", width: 1 } },
          { x: [z, z], y: [0, 0.4], type: "scatter", mode: "lines", line: { color: "var(--gold)", width: 3, dash: "dash" } }
        ];
        if (tail === "both") {
          const az = Math.abs(z), xL = [], yL = [], xR = [], yR = [];
          for(let i=0; i<xV.length; i++) { if (xV[i] <= -az) { xL.push(xV[i]); yL.push(yV[i]); } if (xV[i] >= az) { xR.push(xV[i]); yR.push(yV[i]); } }
          traces.push({ x: xL, y: yL, fill: "tozeroy", type: "scatter", mode: "none", fillcolor: "rgba(0, 207, 255, 0.4)" }, { x: xR, y: yR, fill: "tozeroy", type: "scatter", mode: "none", fillcolor: "rgba(0, 207, 255, 0.4)" });
        } else { traces.push({ x: xS, y: yS, fill: "tozeroy", type: "scatter", mode: "none", fillcolor: "rgba(0, 207, 255, 0.4)" }); }
        Plotly.newPlot(chartRef.current, traces, { paper_bgcolor: "rgba(0,0,0,0)", plot_bgcolor: "rgba(0,0,0,0)", margin: { t: 5, r: 5, b: 20, l: 20 }, xaxis: { range: [-4, 4], gridcolor: "rgba(255,255,255,0.05)" }, yaxis: { visible: false }, showlegend: false, height: 250 }, { responsive: true, displayModeBar: false }); 
      }, [z, tail]);
      const prob = tail === "left" ? ST.normCDF(z) : tail === "right" ? 1 - ST.normCDF(z) : 2 * (1 - ST.normCDF(Math.abs(z)));
      return (
        <div className="grid-2">
          <div className="card">
            <div className="card-title">PROBABILIDAD</div>
            <div style={{display:"grid", gap:"15px", marginBottom:"20px"}}>
              <select className="sip-select" value={col} onChange={e=>setCol(e.target.value)}>{numCols.map(c=><option key={c} value={c}>{c}</option>)}</select>
              <input type="number" className="sip-input" value={valX} onChange={e=>setValX(+e.target.value)} />
              <select className="sip-select" value={tail} onChange={e=>setTail(e.target.value)}><option value="left">Cola Izquierda</option><option value="right">Cola Derecha</option><option value="both">Bilateral</option></select>
            </div>
            <div ref={chartRef}></div>
          </div>
          <div className="card" style={{borderLeft:"4px solid var(--mint)", display:"flex", flexDirection:"column", justifyContent:"center"}}>
            <div className="card-title">RESULTADO (P)</div><p className="result-val">{(prob * 100).toFixed(4)}%</p>
          </div>
        </div>
      );
    }

    function DecisionLogic({ data, columns }) {
      const numCols = useMemo(() => columns.filter(c => data[0] && !isNaN(parseFloat(data[0][c]))), [columns, data]);
      const [col, setCol] = useState(numCols[0] || ""); 
      const [mu0, setMu0] = useState(0); 
      const [alpha, setAlpha] = useState(0.05);
      const chartRef = useRef(null); 
      const stats = useMemo(() => ST.getStats(col, data), [col, data]); 
      const denom = (stats.std / Math.sqrt(Math.max(1, stats.n)));
      const zObs = denom !== 0 ? (stats.mean - mu0) / denom : 0;
      const { zCrit, reject } = useMemo(() => { let zc = ST.normPPF(1 - alpha/2); return { zCrit: zc, reject: Math.abs(zObs) > zc }; }, [zObs, alpha]);
      useEffect(() => { 
        if (!chartRef.current) return; 
        const xV = [], yV = [], xR1 = [], yR1 = [], xR2 = [], yR2 = []; 
        for (let i = 0; i <= 150; i++) { 
          const cx = -4 + (i * 8 / 150), cy = ST.normPDF(cx); xV.push(cx); yV.push(cy); 
          if (cx <= -zCrit) { xR1.push(cx); yR1.push(cy); } if (cx >= zCrit) { xR2.push(cx); yR2.push(cy); } 
        } 
        Plotly.newPlot(chartRef.current, [{ x: xV, y: yV, type: "scatter", mode: "lines", line: { color: "#444" } }, { x: xR1, y: yR1, fill: "tozeroy", type: "scatter", mode: "none", fillcolor: "rgba(255, 60, 0, 0.4)" }, { x: xR2, y: yR2, fill: "tozeroy", type: "scatter", mode: "none", fillcolor: "rgba(255, 60, 0, 0.4)" }, { x: [zObs, zObs], y: [0, 0.4], type: "scatter", mode: "lines", line: { color: reject ? "var(--red)" : "var(--mint)", width: 4 } }], { paper_bgcolor: "rgba(0,0,0,0)", plot_bgcolor: "rgba(0,0,0,0)", margin: { t: 5, r: 5, b: 20, l: 20 }, xaxis: { range: [-4, 4] }, yaxis: { visible: false }, showlegend: false, height: 200 }, { responsive: true, displayModeBar: false }); 
      }, [zObs, zCrit, reject]);
      return (
        <div className="grid-2">
          <div className="card">
            <div className="card-title">HIPÓTESIS</div>
            <div style={{display:'grid', gap:'15px'}}>
              <select className="sip-select" value={col} onChange={e=>setCol(e.target.value)}>{numCols.map(c=><option key={c} value={c}>{c}</option>)}</select>
              <input type="number" className="sip-input" value={mu0} onChange={e=>setMu0(+e.target.value)} placeholder="H0" />
              <select className="sip-select" value={alpha} onChange={e=>setAlpha(+e.target.value)}><option value="0.10">90%</option><option value="0.05">95%</option><option value="0.01">99%</option></select>
            </div>
            <div ref={chartRef} style={{marginTop:20}}></div>
          </div>
          <div className="card" style={{borderLeft: "4px solid " + (reject ? "var(--red)" : "var(--mint)"), display:'flex', flexDirection:'column', justifyContent:'center'}}>
            <p className="result-val" style={{color: reject ? "var(--red)" : "var(--mint)"}}>{reject ? "RECHAZADA" : "ACEPTADA"}</p>
          </div>
        </div>
      );
    }

    function SectionContent({ id, data, columns, onLoaded }) {
      if (id === "upload") return <UploadSection onLoaded={onLoaded} currentData={data} />;
      if (!data || data.length === 0) return <div style={{textAlign:"center", padding:100, color:"var(--cyan)", fontWeight:800}}>POR FAVOR, CARGUE UN ARCHIVO PARA ANALIZAR.</div>;
      switch(id) {
        case "dataset": return (
          <div className="card"><div className="card-title">RESUMEN</div><table className="sip-table"><thead><tr><th>INDICADOR</th><th>PROMEDIO</th><th>VOLATILIDAD</th></tr></thead><tbody>{columns.slice(0,10).map(c=>{const s = ST.getStats(c, data); return <tr key={c}><td>{c}</td><td style={{color:"var(--mint)"}}>{s.mean.toFixed(3)}</td><td>{s.std.toFixed(3)}</td></tr>})}</tbody></table></div>
        );
        case "distribution": return <DistributionFlow data={data} columns={columns} />;
        case "z_value": return <ScoreProcessor data={data} columns={columns} />;
        case "hypothesis": return <DecisionLogic data={data} columns={columns} />;
        default: return <div className="card"><h3>MÓDULO ACTIVO</h3></div>;
      }
    }

    function App() {
      const [activeSection, setActiveSection] = useState(null);
      const [csvData, setCsvData] = useState(() => { try { const s = localStorage.getItem("sip_csv_data"); return s ? JSON.parse(s) : (window.__SIP_DATA__?.records || []); } catch(e) { return []; } });
      const [csvCols, setCsvCols] = useState(() => { try { const s = localStorage.getItem("sip_csv_cols"); return s ? JSON.parse(s) : (window.__SIP_DATA__?.columns || []); } catch(e) { return []; } });
      const [aiResult, setAiResult] = useState(window.__SIP_AI_RESPONSE__ || null);
      
      const isFlyingRef = useRef(false), targetIDRef = useRef(null), activeSectionRef = useRef(null), vScrollRef = useRef(0), mouseRef = useRef({ x: 0, y: 0 }), targetMouseRef = useRef({ x: 0, y: 0 }), requestRef = useRef();
      
      useEffect(() => { activeSectionRef.current = activeSection; }, [activeSection]);
      useEffect(() => { if (csvData && csvData.length > 0) { localStorage.setItem("sip_csv_data", JSON.stringify(csvData)); localStorage.setItem("sip_csv_cols", JSON.stringify(csvCols)); } }, [csvData, csvCols]);

      useEffect(() => {
        const bg = document.getElementById("bg"); if (!bg) return;
        const scene = new THREE.Scene(), camera = new THREE.PerspectiveCamera(60, window.innerWidth/window.innerHeight, 0.1, 10000), renderer = new THREE.WebGLRenderer({ canvas: bg, alpha: true, antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight); camera.position.z = 110;
        
        const stars = new THREE.Points(new THREE.BufferGeometry(), new THREE.PointsMaterial({ size: 1.8, color: 0xffffff, transparent: true, opacity: 0.6, blending: THREE.AdditiveBlending }));
        const sPos = new Float32Array(100000 * 3); for(let i=0; i<300000; i++) sPos[i] = (Math.random()-0.5)*8000;
        stars.geometry.setAttribute("position", new THREE.BufferAttribute(sPos, 3)); scene.add(stars);

        const fCount = 9000, core = new THREE.Points(new THREE.BufferGeometry(), new THREE.PointsMaterial({ size: 0.45, color: 0x00cfff, transparent: true, opacity: 0.8 }));
        const cPos = new Float32Array(fCount * 3), cMeta = new Float32Array(fCount * 3);
        for(let i=0; i<fCount; i++) { 
          const a = Math.random()*Math.PI*2, r = 6 + Math.random()*4; 
          cPos[i*3]=Math.cos(a)*r; cPos[i*3+1]=(Math.random()-0.5)*180; cPos[i*3+2]=Math.sin(a)*r; 
          cMeta[i*3] = 0.3+Math.random()*0.8; cMeta[i*3+1]=r; cMeta[i*3+2]=Math.random()*Math.PI*2; 
        }
        core.geometry.setAttribute("position", new THREE.BufferAttribute(cPos, 3)); scene.add(core);

        const panels = SECTIONS_REF.map((s, i) => {
          const c = document.createElement("canvas"); c.width = 512; c.height = 400; const ctx = c.getContext('2d'); 
          ctx.fillStyle = '#050510'; ctx.fillRect(0,0,512,400); 
          ctx.strokeStyle = (i===0?'#00cfff':i===1?'#ff00cc':i===2?'#ffd600':i===3?'#00ffb2':'#ff3c00'); ctx.lineWidth = 20; ctx.strokeRect(0,0,512,400); 
          ctx.fillStyle = ctx.strokeStyle; ctx.font = "bold 120px Syne"; ctx.textAlign = "center"; ctx.fillText(['↑','▦','∿','∑','Δ'][i], 256, 180); 
          ctx.font = "bold 36px Syne"; ctx.fillText(s.title, 256, 300);
          const p = new THREE.Mesh(new THREE.BoxGeometry(22, 18, 0.5), new THREE.MeshBasicMaterial({ map: new THREE.CanvasTexture(c), transparent: true, opacity: 0.9 })); 
          p.userData = { id: s.id, angle: (i/SECTIONS_REF.length)*Math.PI*2, index: i }; scene.add(p); return p;
        });

        const updateMouse = (e) => { targetMouseRef.current.x = (e.clientX/window.innerWidth)*2-1; targetMouseRef.current.y = -(e.clientY/window.innerHeight)*2+1; const d = document.getElementById('cursor-dot'), r = document.getElementById('cursor-ring'); if(d){ d.style.left=e.clientX+'px'; d.style.top=e.clientY+'px'; } if(r){ r.style.left=e.clientX+'px'; r.style.top=e.clientY+'px'; } };
        const onWheel = e => { if (!activeSectionRef.current) vScrollRef.current += e.deltaY * 0.0006; };
        const raycaster = new THREE.Raycaster();
        const onClick = (e) => { if(isFlyingRef.current || activeSectionRef.current || (e.target && e.target.closest('#section-overlay'))) return; raycaster.setFromCamera(targetMouseRef.current, camera); const hits = raycaster.intersectObjects(panels); if(hits.length > 0) { targetIDRef.current = hits[0].object.userData.id; isFlyingRef.current = true; } };

        window.addEventListener("mousemove", updateMouse); 
        window.addEventListener("wheel", onWheel, { passive: true }); 
        window.addEventListener("click", onClick);

        const animate = () => {
          try {
            requestRef.current = requestAnimationFrame(animate); 
            const time = Date.now()*0.001; 
            mouseRef.current.x += (targetMouseRef.current.x - mouseRef.current.x)*0.05; 
            mouseRef.current.y += (targetMouseRef.current.y - mouseRef.current.y)*0.05;
            if(stars) { stars.rotation.y += 0.0003; stars.position.set(mouseRef.current.x*80, mouseRef.current.y*80, 0); }
            if(core && core.geometry && core.geometry.attributes.position) {
              const cArr = core.geometry.attributes.position.array; 
              for(let i=0; i<fCount; i++){ 
                cArr[i*3+1]+=cMeta[i*3]; if(cArr[i*3+1]>90) cArr[i*3+1]=-90; 
                const rB = cMeta[i*3+1], ph = time + cMeta[i*3+2], tx = Math.cos(ph)*rB + (mouseRef.current.x*12), tz = Math.sin(ph)*rB + (mouseRef.current.y*-12); 
                cArr[i*3] += (tx-cArr[i*3])*0.05; cArr[i*3+2] += (tz-cArr[i*3+2])*0.05; 
              } 
              core.geometry.attributes.position.needsUpdate = true;
            }
            if(!isFlyingRef.current && !activeSectionRef.current){ panels.forEach(p => { const a = p.userData.angle - vScrollRef.current*Math.PI*2, yOffset = ((vScrollRef.current * 5) % 5 + 5) % 5; p.position.set(Math.sin(a)*45, (p.userData.index - yOffset)*22, Math.cos(a)*45); p.rotation.y = a+Math.PI; }); camera.position.lerp(new THREE.Vector3(mouseRef.current.x*25, mouseRef.current.y*25, 120), 0.05); camera.lookAt(0,0,0); }
            else if(isFlyingRef.current) { const t = panels.find(p => p.userData.id === targetIDRef.current); if(t) { const zoomPos = t.position.clone().multiplyScalar(0.4); camera.position.lerp(zoomPos, 0.08); camera.lookAt(t.position); if(camera.position.distanceTo(zoomPos)<1.5){ isFlyingRef.current = false; setActiveSection(targetIDRef.current); } } } 
            renderer.render(scene, camera);
          } catch(err) {}
        };
        animate(); 
        const res = () => { camera.aspect = window.innerWidth / window.innerHeight; camera.updateProjectionMatrix(); renderer.setSize(window.innerWidth, window.innerHeight); };
        window.addEventListener('resize', res);
        return () => { window.removeEventListener('mousemove', updateMouse); window.removeEventListener('wheel', onWheel); window.removeEventListener('click', onClick); window.removeEventListener('resize', res); if (requestRef.current) cancelAnimationFrame(requestRef.current); if (renderer) renderer.dispose(); };
      }, []);

      const requestAI = useCallback(() => {
        if (!csvData || csvData.length === 0) return alert("CARGA DATOS PRIMERO");
        const sStr = csvCols.slice(0,5).map(c => { const s = ST.getStats(c, csvData); return `${c}: Avg=${s.mean.toFixed(2)}, Std=${s.std.toFixed(2)}`; }).join(" | ");
        const url = new URL(window.location.href); url.searchParams.set("ai_query", "1"); url.searchParams.set("section", activeSection || "General"); url.searchParams.set("stats", sStr); window.top.location.href = url.toString();
      }, [csvData, csvCols, activeSection]);

      return (
        <React.Fragment>
          <div id="section-overlay" className={activeSection ? "active" : ""}>
            <div id="sec-header">
              <div className="back-btn" onClick={(e) => { e.stopPropagation(); isFlyingRef.current = false; setActiveSection(null); }}>← SALIR AL CENTRO</div>
              <h1>{SECTIONS_REF.find(s=>s.id===activeSection)?.title}</h1>
              <button className="back-btn ai-btn" onClick={requestAI}>INSIGHTS DE IA</button>
            </div>
            <div id="sec-main">
              {aiResult && ( <div className="card" style={{borderLeft:"4px solid var(--gold)", background:"rgba(255,214,0,0.05)"}}><div className="card-title" style={{color:"var(--gold)"}}>ESTRATEGIA IA</div><div style={{fontSize:14, lineHeight:1.6, whiteSpace:"pre-wrap"}}>{aiResult}</div><button className="back-btn" style={{marginTop:20, fontSize:10, padding:"5px 15px"}} onClick={()=>setAiResult(null)}>CERRAR ANÁLISIS</button></div> )}
              <SectionContent id={activeSection} data={csvData} columns={csvCols} onLoaded={(d,c)=>{setCsvData(d);setCsvCols(c);}} />
            </div>
          </div>
        </React.Fragment>
      );
    }

    const container = document.getElementById("app");
    if(container) { const root = ReactDOM.createRoot(container); root.render(<App />); }
  </script>
</body>
</html>
